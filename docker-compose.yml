# ─── AI Trader ─ Phase 1 ──────────────────────────────────────────────────────
# Services: TimescaleDB, Redis, FastAPI backend, Vite frontend

services:
  # ── TimescaleDB (PostgreSQL 16 + TimescaleDB 2) ───────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aitrader}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-aitrader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432" # 5433 avoids conflict with local Postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-aitrader} -d ${DB_NAME:-aitrader}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Alembic migrations (init container — runs once, then exits) ───────────
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "PYTHONPATH=/app alembic upgrade head"

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app # hot-reload in dev (removed in prod)
      - trained_models_data:/app/models # shared with celery-worker
    command: >
      sh -c "PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ── Celery Worker (async task execution) ──────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SENTIMENT_DEVICE: cuda     # RTX 3050 — FinBERT FP16 inference
      LGBM_DEVICE: gpu           # LightGBM GPU acceleration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - trained_models_data:/app/models # shared with backend
      - hf_model_cache:/root/.cache/huggingface
    command: >
      sh -c "PYTHONPATH=/app celery -A app.tasks.celery_app worker
      --loglevel=info --concurrency=2 -Q celery,low_priority"

  # ── Celery Beat (periodic task scheduler) ─────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - celery-worker
    volumes:
      - ./backend:/app
      - celery_beat_data:/tmp/celerybeat
      - hf_model_cache:/root/.cache/huggingface
    command: >
      sh -c "PYTHONPATH=/app celery -A app.tasks.celery_app beat
      --loglevel=info --scheduler celery.beat:PersistentScheduler
      --schedule /tmp/celerybeat/celerybeat-schedule"

  # ── Flower (Celery task monitor — http://localhost:5555) ─────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    volumes:
      - ./backend:/app
    command: >
      sh -c "PYTHONPATH=/app FLOWER_UNAUTHENTICATED_API=true celery -A app.tasks.celery_app flower
      --port=5555 --broker_api=redis://:${REDIS_PASSWORD}@redis:6379/1"

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    restart: unless-stopped
    environment:
      MLFLOW_BACKEND_STORE_URI: "postgresql://${DB_USER:-aitrader}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-aitrader}"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri "postgresql://${DB_USER:-aitrader}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-aitrader}"
      --default-artifact-root /mlflow/artifacts

  # ── Vite Frontend (dev server) ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend

  # ── Cloudflare Tunnel (stable webhook URL for broker postbacks) ───────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - backend
    command: tunnel --no-autoupdate --url http://backend:8000

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
  hf_model_cache:
  trained_models_data: # LightGBM .pkl artifacts shared between backend + celery-worker
  mlflow_artifacts: # MLflow experiment artifacts
